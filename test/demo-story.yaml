title: A Test Adventure
author: Test Author
version: 1.0

vars:
  skill: 10
  luck: 5
  stamina: 20
  bag: []

sections:
  start:
    text: "You stand at the entrance of a dark cave. The air is damp and the sound of dripping water echoes from within. There is moss and lichen growing on the walls, there is rubble and rocks on the ground. The cave extends into darkness ahead."
    vars:
      searched: false
    options:
      enter:
        text: "Enter the cave"
        goto: dark_tunnel
      go_out: ["Return to your camp outside", camp_outside]
      search:
        text: "Search the area"
        if: not searched
        run: searched = true
        goto: search_cave_area

  camp_outside:
    text: "You decide to leave the cave and return to your camp outside. The sun is shining, and the birds are chirping."
    options:
      return: ["Return to the cave entrance", start]

  dark_tunnel:
    text: "You venture deeper into the cave, the darkness enveloping you. You can barely see a few feet ahead."
    options:
      left_path: ["Take the left path", left_chamber]
      right_path: ["Take the right path", right_chamber]

  left_chamber:
    text: "You enter a chamber filled with glittering crystals that reflect the faint light from your lantern."
    options:
      return: ["Return to the dark tunnel", dark_tunnel]

  right_chamber:
    text: "You find yourself in a damp chamber with a small underground pool of water."

  search_cave_area:
    text: "You find a rusty old lantern half-buried in the dirt."
    options:
      back: ["Return to the cave entrance", start]

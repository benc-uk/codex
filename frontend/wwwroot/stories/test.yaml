title: Combat Test
author: Test Author
version: 1.0

vars:
  skill: 10
  luck: 5
  stamina: 20

init: |
  function battle(name, enemy_skill, enemy_stamina)
    temp.player_attack = d(6) + d(6) + skill
    temp.goblin_attack = d(6) + d(6) + enemy_skill
    msg = "Your attack roll: "..temp.player_attack.."\nThe enemy rolls: "..temp.goblin_attack.."\n\n"
    if temp.player_attack > temp.goblin_attack then
      enemy_stamina = math.max(0, enemy_stamina - 2)
      msg = msg.."You hit the "..name.." for 2 damage!"
    elseif temp.goblin_attack > temp.player_attack then
      stamina = stamina - 2
      msg = msg.."The "..name.." hits you for 2 damage!"
    else
      msg = msg.."It's a tie! No damage dealt."
    end
    return enemy_stamina
  end

sections:
  start:
    title: "The Goblin's Den"
    text: "You are in a dusty cave. A goblin blocks your path."
    vars:
      searched: false
    options:
      enter:
        text: "Fight the goblin"
        goto: fight_goblin

  fight_goblin:
    title: "Goblin Battle"
    text: "You are engaged in combat with a ugly goblin.\nThey have {section.goblin_hp} HP left."
    run_once: section.goblin_hp = 7
    run: temp.goblin_skill = 6
    options:
      victory:
        text: "Collect your reward."
        if: section.goblin_hp <= 0
        goto: goblin_victory
      fight:
        text: "Hit the enemy!"
        if: section.goblin_hp > 0
        run: section.goblin_hp = battle("goblin", temp.goblin_skill, section.goblin_hp)
        goto: fight_goblin
        notify: "{msg}"
      run_away:
        text: "Flee!"
        if: section.visits > 3 and section.goblin_hp > 0
        notify: "You have fled the battle!"
        goto: cave_of_shame

  goblin_victory:
    text: "You have defeated the goblin and found a treasure chest!"

  cave_of_shame:
    text: "You fled the battle and retreated to the Cave of Shame. You feel embarrassed."

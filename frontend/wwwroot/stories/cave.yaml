title: A Test Adventure
author: Test Author
version: 1.0

vars:
  skill: 11
  luck: 5
  stamina: 20
  gold: 0
  #bag: []
  have_crystal: false
  fish: 0

init: |
  function battle(name, enemy_skill, enemy_stamina)
    temp.player_attack = d(6) + d(6) + skill
    temp.goblin_attack = d(6) + d(6) + enemy_skill
    msg = "Your attack roll: "..temp.player_attack.."\nThe enemy rolls: "..temp.goblin_attack.."\n\n"
    if temp.player_attack > temp.goblin_attack then
      enemy_stamina = math.max(0, enemy_stamina - 2)
      msg = msg.."You hit the "..name.." for 2 damage!"
    elseif temp.goblin_attack > temp.player_attack then
      stamina = stamina - 2
      msg = msg.."The "..name.." hits you for 2 damage!"
    else
      msg = msg.."It's a tie! No damage dealt."
    end
    return enemy_stamina
  end

sections:
  start:
    title: "Cave Entrance"
    text: "You stand at the entrance of a dark cave. The air is damp and the sound of dripping water echoes from within. There is moss and lichen growing on the walls, there is rubble and rocks on the ground. The cave extends into darkness ahead."
    options:
      enter:
        text: "Enter the cave"
        goto: dark_tunnel

      go_out: ["Return to your camp", camp_outside]

      search:
        text: "Search the area"
        if: not section.searched
        run: |
          section.searched = true
          temp.gold = d(8) + 2;
        notify: "You find {temp.gold} gold coins hidden under some rocks near the cave entrance."
        goto: start

  camp_outside:
    title: "Camp Outside the Cave"
    text: "You decide to return to your camp. There is a small clearing with a fire pit and some basic supplies.\n\nThe sun is shining, and the birds are chirping. You feel a sense of peace and tranquility in contrast to the dread lurking within the cave."
    options:
      return: ["Back to cave entrance", start]
      rest:
        text: "Rest at your camp"
        if: not section.inc_stamina
        run: section.inc_stamina = d(3); stamina = stamina + section.inc_stamina
        notify: "You rest for a while at your camp and regain {section.inc_stamina} stamina."
        goto: camp_outside

  dark_tunnel:
    text: "You venture deeper into the cave, it's nearly pitch black and you can barely see anything. The walls are damp and the air is cool. You can hear the sound of dripping water echoing through the tunnel. After a few moments, you come to a fork in the path."
    options:
      left_path: ["Take the left path", left_chamber]
      right_path:
        text: "Take the right path"
        if: not have_crystal
        notify: "It's too dark to go that way without a light source"
        goto: dark_tunnel
      right_path_lit:
        text: "Take the right path"
        if: have_crystal
        goto: right_chamber

  left_chamber:
    title: "Glowing Crystal Chamber"
    text: "This area is filled with a soft, glowing light emanating from several crystals embedded in the walls. The crystals pulse gently, casting eerie shadows on the cave floor. The air here feels warmer and more humid compared to the dark tunnel you came from."
    options:
      return: ["Return to the dark tunnel", dark_tunnel]
      take_blue_crystal:
        text: "Take one of the blue glowing crystals"
        if: not have_crystal
        run: stamina = stamina - 2
        notify: "As you reach for one of the blue crystals, a sudden chill runs through your body, sapping some of your stamina."
        goto: left_chamber
      take_green_crystal:
        text: "Take one of the green glowing crystals"
        if: not have_crystal
        notify: "You pick up one of the green crystals, it looks useless you decide to leave it be."
        goto: left_chamber
      take_red_crystal:
        text: "Take one of the red glowing crystals"
        if: not have_crystal
        run: have_crystal = true
        notify: "You carefully pick up one of the red glowing crystals. It emits a gentle light, illuminating your surroundings."
        goto: left_chamber

  right_chamber:
    title: "Underground Pool"
    text: "You find yourself in a damp chamber with a small underground pool of water. The walls glisten with moisture, and you can see {section.fish} small fish swimming in the pool. The air is cool and fresh, a stark contrast to the dark tunnel you came from."
    run: if not section.fish then section.fish = d(4) + d(4) end
    options:
      return: ["Return to the dark tunnel", dark_tunnel]
      fish:
        text: "Try to catch some fish"
        if: section.fish > 0
        run: stamina = stamina - 2
          section.fish = section.fish - 1
          fish = fish + 1
        notify: "You catch a small fish from the pool and feel a bit tired from the effort."
        goto: right_chamber
      go_deeper:
        text: "Go deeper into the cave"
        goto: goblin_den

  goblin_den:
    title: "The Goblin's Den"
    text: "You are in a filthy cave, bones and scraps of old belongings are scattered about. A goblin blocks your path."
    options:
      fight:
        text: "Fight the goblin"
        goto: fight_goblin
      go_back: ["Retreat", right_chamber]

  fight_goblin:
    title: "Goblin Battle"
    text: "You are engaged in combat with a ugly goblin.\nThey have {section.goblin_hp} HP left."
    run_once: section.goblin_hp = 7
    run: temp.goblin_skill = 5
    options:
      victory:
        text: "Collect your reward."
        if: section.goblin_hp <= 0
        run: temp.gold = d(10) + 5
        notify: "You have defeated the goblin and found {temp.gold} gold coins in filthy pouch"
        goto: end
      fight:
        text: "Hit the enemy!"
        if: section.goblin_hp > 0
        run: section.goblin_hp = battle("goblin", temp.goblin_skill, section.goblin_hp)
        goto: fight_goblin
        notify: "{msg}"
      run_away:
        text: "Flee!"
        if: section.visits > 3 and section.goblin_hp > 0
        notify: "You have fled the battle!"
        goto: right_chamber
      hand_over_fish:
        text: "Offer fish to the goblin"
        if: fish > 1 and section.goblin_hp > 0
        run: fish = 0; section.goblin_hp = 0
        notify: "The goblin gratefully accepts the fish and lets you pass unharmed."
        goto: end

  end:
    title: "The End!"
    text: "You have emerged victorious from the cave adventure, richer and wiser from your experiences."
